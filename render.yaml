services:
  - type: web
    name: ezheyo-backend
    env: node
    region: ohio
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000

  - type: web
    name: ezheyo-frontend
    env: node
    region: ohio
    plan: starter
    rootDir: frontend/app
    buildCommand: npm install && npm run build
    startCommand: npm start
